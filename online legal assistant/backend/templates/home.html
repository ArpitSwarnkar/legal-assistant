<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Legal Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    display: flex;
    height: 100vh;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(10px);
    padding: 20px;
    border-right: 1px solid #334155;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.logout { background: #ef4444; color: white; }
.clear { background: #3b82f6; color: white; }

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* HEADER */
.header {
    padding: 15px;
    font-size: 20px;
    font-weight: 600;
    border-bottom: 1px solid #334155;
    background: rgba(30, 41, 59, 0.8);
}

/* CHAT */
.chat {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
}

/* MESSAGE */
.msg {
    max-width: 60%;
    padding: 12px 16px;
    margin: 10px 0;
    border-radius: 12px;
    animation: fadeIn 0.3s ease-in-out;
}

.user {
    background: #2563eb;
    margin-left: auto;
}

.bot {
    background: #334155;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 15px;
    border-top: 1px solid #334155;
    background: rgba(30, 41, 59, 0.8);
}

.input-area input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

.input-area button {
    margin-left: 10px;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    background: #10b981;
    color: white;
    cursor: pointer;
}

/* ANIMATION */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚖️LegalAssistant</h2>
    <button class="clear" onclick="clearChat()">🧹 Clear Chat</button>
    <button class="logout" onclick="logout()">🚪 Logout</button>
</div>

<!-- MAIN -->
<div class="main">

    <div class="header">
        Online Legal Assistant 🤖
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Ask your legal question...">
        <button onclick="startListening()">🎤</button>
        <button onclick="sendMessage()">Send</button>
        <button onclick="exportPDF()">📄 Export PDF</button>
    </div>

</div>
<script> async function sendMessage() { 
    const input = document.getElementById("input");
     const chat = document.getElementById("chat");
     const message = input.value.trim(); 
     if (!message) return; 
    chat.innerHTML += `<div class="msg user">${message}</div>`;
     input.value = ""; 
     chat.scrollTop = chat.scrollHeight; 
     const res = await fetch("/api/ask", {
         method: "POST", 
         headers: {"Content-Type": "application/json"}, 
         body: JSON.stringify({question: message}) 
        });
     const data = await res.json(); 

     const botDiv = document.createElement("div"); 
     botDiv.className = "msg bot";
     chat.appendChild(botDiv);
     let i = 0;
     function typing() {
         if (i < data.answer.length) {
             botDiv.innerHTML += data.answer.charAt(i);
             i++;
             setTimeout(typing, 10); 
            }
         } 
         typing();

setTimeout(() => {
    speak(data.answer);
}, 1000); // speak after typing starts
         chat.scrollTop = chat.scrollHeight;
         }
         function clearChat() {
             document.getElementById("chat").innerHTML = "";
         } async function logout() { 
            await fetch("/api/logout"); 
            window.location.href = "/"; 
        } // ✅ FIXED EXPORT
        function exportPDF() { 
            window.open("/api/export-pdf", "_blank"); 
        }

let recognition;
let isListening = false;

function startListening() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Speech Recognition not supported");
        return;
    }

    const micBtn = document.querySelector("button[onclick='startListening()']");

    if (isListening) {
        recognition.stop();
        isListening = false;
        micBtn.innerText = "🎤"; // reset
        return;
    }

    recognition = new SpeechRecognition();

    recognition.lang = "hi-IN";
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.start();
    isListening = true;

    recognition.onstart = () => {
        micBtn.innerText = "🎧 Listening..."; // 🔥 change text
    };

    recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById("input").value = transcript;

        sendMessage();
    };

    recognition.onerror = (event) => {
        alert("Mic error: " + event.error);
    };

    recognition.onend = () => {
        isListening = false;
        micBtn.innerText = "🎤"; // 🔥 back to normal
    };
}
      </script>


</body>
</html>
