
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: linear-gradient(135deg, #4f46e5, #9333ea);
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    text-align: center;
    padding: 60px;
}

/* DROP TEXT */
.drop-text {
    font-size: 52px;
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: 2px;
}

.drop-text span {
    display: inline-block;
    opacity: 0;
    transform: translateY(-50px);
    animation: drop 0.5s forwards;
}

/* delays */
.drop-text span:nth-child(1) { animation-delay: 0.1s; }
.drop-text span:nth-child(2) { animation-delay: 0.2s; }
.drop-text span:nth-child(3) { animation-delay: 0.3s; }
.drop-text span:nth-child(4) { animation-delay: 0.4s; }
.drop-text span:nth-child(5) { animation-delay: 0.5s; }

.drop-text span:nth-child(7) { animation-delay: 0.6s; }
.drop-text span:nth-child(8) { animation-delay: 0.7s; }
.drop-text span:nth-child(9) { animation-delay: 0.8s; }
.drop-text span:nth-child(10) { animation-delay: 0.9s; }
.drop-text span:nth-child(11) { animation-delay: 1s; }
.drop-text span:nth-child(12) { animation-delay: 1.1s; }
.drop-text span:nth-child(13) { animation-delay: 1.2s; }
.drop-text span:nth-child(14) { animation-delay: 1.3s; }
.drop-text span:nth-child(15) { animation-delay: 1.4s; }

@keyframes drop {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* TEXT */
.left p {
    margin-top: 20px;
    font-size: 18px;
    opacity: 0.9;
    max-width: 420px;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* LOGIN CARD */
.card {
    width: 350px;
    padding: 30px;
    border-radius: 12px;
    background: #1e293b;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.card h2 {
    color: white;
    text-align: center;
    margin-bottom: 20px;
}

/* INPUT */
.input-box {
    margin-bottom: 15px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #334155;
    color: white;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* ERROR */
.error {
    color: #ff6b6b;
    text-align: center;
    margin-top: 10px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .left {
        display: none;
    }
    .right {
        width: 100%;
    }
}
.footer {
    text-align: center;
    margin-top: 15px;
    color: #aaa;
    font-size: 14px;
}

.footer a {
    color: #8b5cf6;
    text-decoration: none;
    font-weight: 500;
}

.footer a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <h1 class="drop-text">
        <span>⚖️</span>
        <span>L</span>
        <span>e</span>
        <span>g</span>
        <span>a</span>
        <span>l</span>
        <br>
        <span>A</span>
        <span>s</span>
        <span>s</span>
        <span>i</span>
        <span>s</span>
        <span>t</span>
        <span>a</span>
        <span>n</span>
        <span>t</span>
    </h1>

    <p>
        AI-powered legal assistant for instant help, documents, and guidance.
    </p>
</div>

<!-- RIGHT (LOGIN) -->
<div class="right">
    <div class="card">
        <h2>Login</h2>

        <div class="input-box">
            <input id="email" type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input id="password" type="password" placeholder="Password">
        </div>

        <button class="btn" onclick="login()">Login</button>
        <div class="footer">
    Don’t have an account? <a href="/register">Register</a>
</div>

        <div class="error" id="errorMsg"></div>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if (!email || !password) {
        errorMsg.innerText = "Fill all fields";
        return;
    }

    try {
        let res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        let data = await res.json();

        if (res.ok) {
            window.location.href = "/home";
        } else {
            errorMsg.innerText = data.error || "Login failed";
        }

    } catch {
        errorMsg.innerText = "Server error";
    }
}
</script>

</body>
</html>
