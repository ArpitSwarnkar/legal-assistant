
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legal Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
}

body {
    height: 100vh;
    display: flex;
}

/* LEFT SIDE */
.left {
    width: 50%;
    background: linear-gradient(135deg, #4f46e5, #9333ea);
    color: white;

    display: flex;
    flex-direction: column;
    justify-content: center;   /* vertical center */
    align-items: center;       /* horizontal center */

    text-align: center;        /* center text */

    padding: 60px;
    animation: fadeIn 1s ease;
}

.left h1 {
    font-size: 42px;
    margin-bottom: 20px;
}

.left p {
    font-size: 18px;
    opacity: 0.9;
    line-height: 1.6;
}

/* RIGHT SIDE */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #0f172a;
}

/* CARD */
.card {
    width: 370px;
    padding: 35px;
    border-radius: 15px;
    background: #1e293b;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    animation: fadeIn 1s ease;
}

.card h2 {
    color: white;
    text-align: center;
    margin-bottom: 25px;
}

/* INPUT */
.input-box {
    position: relative;
    margin-bottom: 20px;
}

.input-box input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #334155;
    color: white;
}

/* EYE ICON */
.eye {
    position: absolute;
    right: 10px;
    top: 12px;
    cursor: pointer;
    color: #aaa;
}

/* BUTTON */
.btn {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.03);
}

.btn.loading {
    opacity: 0.7;
    pointer-events: none;
}

/* ERROR */
.error {
    color: #ff6b6b;
    text-align: center;
    margin-top: 10px;
    font-size: 14px;
}

/* FOOTER */
.footer {
    text-align: center;
    margin-top: 15px;
    color: #aaa;
}

.footer a {
    color: #8b5cf6;
}

/* ANIMATION */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* RESPONSIVE */
@media (max-width: 768px) {
    .left {
        display: none;
    }
    .right {
        width: 100%;
    }
}
/* DROP TEXT ANIMATION */
.drop-text {
    text-align: center;
    letter-spacing: 2px;
}

.drop-text span {
    display: inline-block;
    opacity: 0;
    transform: translateY(-50px);
    animation: drop 0.5s forwards;
}

.drop-text span:nth-child(1) { animation-delay: 0.1s; }
.drop-text span:nth-child(2) { animation-delay: 0.2s; }
.drop-text span:nth-child(3) { animation-delay: 0.3s; }
.drop-text span:nth-child(4) { animation-delay: 0.4s; }
.drop-text span:nth-child(5) { animation-delay: 0.5s; }

.drop-text span:nth-child(7) { animation-delay: 0.6s; }
.drop-text span:nth-child(8) { animation-delay: 0.7s; }
.drop-text span:nth-child(9) { animation-delay: 0.8s; }
.drop-text span:nth-child(10) { animation-delay: 0.9s; }
.drop-text span:nth-child(11) { animation-delay: 1s; }
.drop-text span:nth-child(12) { animation-delay: 1.1s; }
.drop-text span:nth-child(13) { animation-delay: 1.2s; }
.drop-text span:nth-child(14) { animation-delay: 1.3s; }
.drop-text span:nth-child(15) { animation-delay: 1.4s; }

@keyframes drop {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<!-- LEFT -->
<div class="left">
    <h1 class="drop-text">
        <span>⚖️</span>
        <span>L</span>
        <span>e</span>
        <span>g</span>
        <span>a</span>
        <span>l</span>
        <br>
        <span>A</span>
        <span>s</span>
        <span>s</span>
        <span>i</span>
        <span>s</span>
        <span>t</span>
        <span>a</span>
        <span>n</span>
        <span>t</span>
    </h1>

    <p>
        Your AI-powered legal companion.<br>
        Get instant legal help anytime.
    </p>
</div>

<!-- RIGHT -->
<div class="right">
    <div class="card">
        <h2>Welcome Back</h2>

        <div class="input-box">
            <input id="email" type="email" placeholder="Email">
        </div>

        <div class="input-box">
            <input id="password" type="password" placeholder="Password">
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <button class="btn" id="loginBtn" onclick="login()">Login</button>

        <div class="error" id="errorMsg"></div>

        <div class="footer">
            Don’t have an account? <a href="#">Register</a>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

// ENTER KEY LOGIN
document.addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
});

async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const btn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");

    errorMsg.innerText = "";

    if (!email || !password) {
        errorMsg.innerText = "Please fill all fields";
        return;
    }

    btn.classList.add("loading");
    btn.innerText = "Logging in...";

    try {
        let res = await fetch("http://127.0.0.1:5000/api/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        let data = await res.json();

        if (res.ok) {
            window.location.href = "/home";
        } else {
            errorMsg.innerText = data.error || "Login failed";
        }

    } catch (err) {
        errorMsg.innerText = "Server error";
    }

    btn.classList.remove("loading");
    btn.innerText = "Login";
}
</script>

</body>
</html>
